<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планёр домашних дел — Календарь</title>
    <script>
      (function() {
        var theme = localStorage.getItem('planner-theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/calendar.css">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <h1 class="app-title">Планёр</h1>
            <nav class="main-nav">
                <a href="index.html" class="nav-link active" data-page="calendar">Календарь</a>
                <a href="dashboard.html" class="nav-link" data-page="dashboard">Дашборд</a>
                <a href="admin.html" class="nav-link" data-page="admin">Админка</a>
            </nav>
        </div>
        <button id="theme-toggle" class="theme-btn" title="Переключить тему" aria-label="Переключить тему">
            <span class="theme-icon-light">☀️</span>
            <span class="theme-icon-dark">🌙</span>
        </button>
    </header>
    <main id="app"></main>
    <div id="error-toast" class="toast hidden"></div>
    <script type="module" src="js/theme.js"></script>
    <script type="module" src="js/calendar.js"></script>
</body>
</html>
