services:
  backend:
    volumes:
      - ./backend/src:/app/src
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  frontend:
    build: null
    image: python:3.13-slim
    restart: "no"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: >
      python -m http.server 80
      --bind 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-5500}:80"
